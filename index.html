<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oddiy html file</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <h1>Oddiy html file</h1>


    <section>

        <!-- Display blockda element butun qatorni egallaydi va keyingi element yangi qatorga tushadi. 
        Xususiyatlari: Yangi qatordan boshlanadi. height va width ishlaydi. Va butun qatorni egallaydi -->

        <h2>display: block</h2>
        <div class="block">Block 1</div>
        <div class="block">Block 2</div>
    </section>

    <section>
        <h2>display: inline</h2>
        <span class="inline">Inline 1</span>
        <span class="inline">Inline 2</span>
    </section>

    <section>
        <h2>display: inline-block</h2>
        <div class="inline-block">Box 1</div>
        <div class="inline-block">Box 2</div>
    </section>

    <!-- NONE -->
    <section>
        <h2>display: none</h2>
        <div class="visible">You can see me</div>
        <div class="hidden">You cannot see me</div>
    </section>

    <section>
        <h2>display: flex</h2>
        <div class="flex-container">
            <div class="flex-item">1</div>
            <div class="flex-item">2</div>
            <div class="flex-item">3</div>
        </div>
    </section>

     <section>
  <h2>display: grid</h2> 
        <div class="grid-main">
        
            <div class="grid-item">1</div>
            <div class="grid-item">2</div>
            <div class="grid-item">3</div>
            <div class="grid-item">4</div>
            <div class="grid-item">5</div>
            <div class="grid-item">6</div>
        </div>
     </section>


     <section>

        <div class="grid-main2">
            
            <img src="https://picsum.photos/200" alt="">
            <img src="https://picsum.photos/200" alt="">
            <img src="https://picsum.photos/200" alt="">
            <img src="https://picsum.photos/200" alt="">

        </div>

    </section>




</body>
</html>
